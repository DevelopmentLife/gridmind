# =============================================================================
# GridMind — Continuous Integration
# =============================================================================
# Triggers on every push to any branch.
# Matrix jobs: lint, test, build for Python and TypeScript services.
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Python Linting: ruff + mypy
  # ---------------------------------------------------------------------------
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [cortex, gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Install service dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true

      - name: Install shared package
        run: pip install -e ./shared 2>/dev/null || true

      - name: Ruff check
        run: ruff check services/${{ matrix.service }} shared/

      - name: Mypy strict
        run: mypy --strict services/${{ matrix.service }} shared/

  # ---------------------------------------------------------------------------
  # TypeScript Linting: eslint
  # ---------------------------------------------------------------------------
  lint-typescript:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [admin, portal, superadmin]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          npm ci

      - name: ESLint
        run: |
          cd services/${{ matrix.service }}
          npx eslint . --max-warnings 0

  # ---------------------------------------------------------------------------
  # Python Tests: pytest with PostgreSQL + Redis service containers
  # ---------------------------------------------------------------------------
  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [cortex, gateway]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gridmind_test
          POSTGRES_USER: gridmind
          POSTGRES_PASSWORD: gridmind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gridmind"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      GRIDMIND_ENV: test
      GRIDMIND_DB_HOST: localhost
      GRIDMIND_DB_PORT: "5432"
      GRIDMIND_DB_NAME: gridmind_test
      GRIDMIND_DB_USER: gridmind
      GRIDMIND_DB_PASSWORD: gridmind_test
      GRIDMIND_REDIS_URL: redis://localhost:6379/0
      GRIDMIND_NATS_URL: nats://localhost:4222
      GRIDMIND_ANTHROPIC_API_KEY: mock-anthropic-key-for-ci-tests
      GRIDMIND_JWT_SECRET: ci-test-jwt-secret-not-a-real-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -e ".[dev]" 2>/dev/null || pip install -e ".[test]" 2>/dev/null || pip install -e . 2>/dev/null || true
          pip install pytest pytest-cov pytest-asyncio

      - name: Install shared package
        run: pip install -e ./shared 2>/dev/null || true

      - name: Run tests with coverage
        run: |
          cd services/${{ matrix.service }}
          pytest \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.xml

  # ---------------------------------------------------------------------------
  # TypeScript Tests: vitest with coverage
  # ---------------------------------------------------------------------------
  test-typescript:
    name: Test TypeScript
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [admin, portal, superadmin]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          npm ci

      - name: Run tests with coverage
        run: |
          cd services/${{ matrix.service }}
          npx vitest run --coverage --coverage.thresholds.lines=85

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/

  # ---------------------------------------------------------------------------
  # SAST: Semgrep static analysis (OWASP Top 10, secrets, Python, TypeScript)
  # ---------------------------------------------------------------------------
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: >
          semgrep ci
          --config p/python
          --config p/typescript
          --config p/owasp-top-ten
          --config p/secrets
          --error
          --no-suppress-errors
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ---------------------------------------------------------------------------
  # Build Docker Images
  # ---------------------------------------------------------------------------
  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, cortex, admin, portal, superadmin]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: false
          tags: gridmind-${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # CI Gate — all jobs must pass
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - lint-python
      - lint-typescript
      - test-python
      - test-typescript
      - sast
      - build-images
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint-python.result }}" != "success" ]] || \
             [[ "${{ needs.lint-typescript.result }}" != "success" ]] || \
             [[ "${{ needs.test-python.result }}" != "success" ]] || \
             [[ "${{ needs.test-typescript.result }}" != "success" ]] || \
             [[ "${{ needs.sast.result }}" != "success" ]] || \
             [[ "${{ needs.build-images.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
