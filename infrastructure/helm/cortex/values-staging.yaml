###############################################################################
# cortex — Staging overrides
###############################################################################

replicaCount: 2

image:
  pullPolicy: Always

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2000m"
    memory: "4Gi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

env:
  ENVIRONMENT: "staging"
  LOG_LEVEL: "INFO"
  AGENT_CONCURRENCY: "16"

vault:
  enabled: true

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: cortex
          topologyKey: kubernetes.io/hostname
