###############################################################################
# cortex — Default values (dev-suitable)
# Cortex is an internal service — no ingress, metrics-only external port
###############################################################################

replicaCount: 1

image:
  repository: ""  # Set to ECR URL at deploy time
  tag: "latest"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  annotations: {}
  name: "cortex"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  metricsPort: 9090

# Cortex has no public ingress — internal service only
ingress:
  enabled: false

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1

livenessProbe:
  httpGet:
    path: /metrics
    port: 9090
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /metrics
    port: 9090
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

env:
  ENVIRONMENT: "dev"
  LOG_LEVEL: "INFO"
  METRICS_PORT: "9090"
  AGENT_CONCURRENCY: "8"

envFromSecrets:
  - name: cortex-secrets
    optional: false

vault:
  enabled: false
  role: "cortex"

nodeSelector: {}

tolerations: []

affinity: {}

topologySpreadConstraints: []

volumeMounts:
  - name: tmp
    mountPath: /tmp

volumes:
  - name: tmp
    emptyDir: {}
