###############################################################################
# admin — Default values (dev-suitable)
###############################################################################

replicaCount: 1

image:
  repository: ""  # Set to ECR URL at deploy time
  tag: "latest"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  annotations: {}
  name: "admin"

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
  hosts:
    - host: "admin-dev.gridmind.io"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: gridmind-tls-wildcard
      hosts:
        - "admin-dev.gridmind.io"

resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1

livenessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

env:
  NODE_ENV: "production"
  PORT: "3000"
  ENVIRONMENT: "dev"
  NEXT_TELEMETRY_DISABLED: "1"

envFromSecrets:
  - name: admin-secrets
    optional: false

vault:
  enabled: false
  role: "admin"

nodeSelector: {}

tolerations: []

affinity: {}

topologySpreadConstraints: []

volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: nextjs-cache
    mountPath: /app/.next/cache

volumes:
  - name: tmp
    emptyDir: {}
  - name: nextjs-cache
    emptyDir: {}
